<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeRender 3D - TikTok Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-neutral-950 text-neutral-100 overflow-hidden select-none antialiased">

    <div class="flex flex-col h-screen max-h-screen w-screen overflow-hidden">
        
        <header class="flex items-center justify-between px-4 py-3 bg-neutral-900/50 backdrop-blur-md border-b border-neutral-800/60 z-50">
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 rounded-full bg-orange-500 animate-pulse"></div>
                <h1 class="text-sm font-bold tracking-wider uppercase text-neutral-300">VibeRender <span class="text-orange-500">3D</span></h1>
            </div>
            <div class="flex gap-2">
                <button id="btn-export" class="flex items-center gap-1.5 bg-orange-600 hover:bg-orange-500 text-white text-xs font-semibold px-3 py-1.5 rounded-full shadow-lg transition-all active:scale-95">
                    <i data-lucide="download" class="w-3.5 h-3.5"></i> Export 9:16
                </button>
            </div>
        </header>

        <main class="flex-1 relative flex items-center justify-center p-3 bg-neutral-900">
            <div id="canvas-container" class="relative aspect-[9/16] h-full max-h-[65vh] md:max-h-[70vh] rounded-2xl overflow-hidden shadow-2xl border border-neutral-800 bg-black">
                <div id="three-canvas-target" class="w-full h-full"></div>
                
                <div class="absolute inset-0 pointer-events-none border border-dashed border-orange-500/20 rounded-2xl m-2"></div>
                <div class="absolute bottom-16 left-4 text-left text-[10px] text-white/40 pointer-events-none font-mono">
                    <p class="font-bold text-white/60">@TomIconic</p>
                    <p>TikTok UI Safe Zone Mask Active</p>
                </div>
            </div>
        </main>

        <section class="bg-neutral-900/90 backdrop-blur-xl border-t border-neutral-800 p-4 pb-6 flex flex-col gap-4 z-40">
            <div class="flex items-center gap-3 w-full bg-neutral-950/60 px-3 py-2 rounded-xl border border-neutral-800/40">
                <button id="btn-play" class="p-1.5 bg-neutral-800 rounded-lg text-orange-500 transition active:scale-90">
                    <i data-lucide="play" class="w-4 h-4" id="play-icon"></i>
                </button>
                <div class="flex-1 relative flex items-center">
                    <input type="range" id="timeline-slider" min="0" max="100" value="0" class="w-full accent-orange-500 bg-neutral-800 h-1 rounded-lg appearance-none cursor-pointer">
                </div>
                <span id="timeline-time" class="text-xs font-mono text-neutral-400">00:00</span>
            </div>

            <div class="flex border-b border-neutral-800 text-xs font-medium">
                <button id="tab-text" class="flex-1 pb-2 border-b-2 border-orange-500 text-orange-500 text-center">Typography</button>
                <button id="tab-camera" class="flex-1 pb-2 border-b-2 border-transparent text-neutral-400 text-center">Camera Rig</button>
                <button id="tab-presets" class="flex-1 pb-2 border-b-2 border-transparent text-neutral-400 text-center">Presets</button>
            </div>

            <div class="min-h-[140px] max-h-[180px] overflow-y-auto custom-scrollbar text-sm">
                <div id="panel-text" class="space-y-4">
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs text-neutral-400 font-semibold tracking-wide uppercase">Text Input</label>
                        <input type="text" id="input-3d-text" value="PRO" class="bg-neutral-950 border border-neutral-800 rounded-xl px-3 py-2 text-white focus:outline-none focus:border-orange-500 font-sans tracking-wide">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="flex flex-col gap-1.5">
                            <label class="text-xs text-neutral-400 font-semibold uppercase">Extrusion Depth</label>
                            <input type="range" id="slider-depth" min="0.1" max="2" step="0.1" value="0.5" class="accent-orange-500 bg-neutral-950 h-1.5 rounded-lg appearance-none">
                        </div>
                        <div class="flex flex-col gap-1.5">
                            <label class="text-xs text-neutral-400 font-semibold uppercase">Font Loader</label>
                            <label class="bg-neutral-950 border border-neutral-800 border-dashed rounded-xl px-3 py-1.5 text-center text-xs text-neutral-400 cursor-pointer hover:border-orange-500 transition block">
                                <i data-lucide="upload" class="w-3 h-3 inline mr-1"></i> Add Custom (.json)
                                <input type="file" id="font-uploader" accept=".json" class="hidden">
                            </label>
                        </div>
                    </div>
                </div>

                <div id="panel-camera" class="hidden space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <div class="flex flex-col gap-1.5">
                            <label class="text-xs text-neutral-400 font-semibold uppercase">Camera Track Speed</label>
                            <input type="range" id="slider-cam-speed" min="0" max="4" step="0.1" value="1" class="accent-orange-500 bg-neutral-950 h-1.5 rounded-lg appearance-none">
                        </div>
                        <div class="flex flex-col gap-1.5">
                            <label class="text-xs text-neutral-400 font-semibold uppercase">Focal Rotation</label>
                            <input type="range" id="slider-cam-rot" min="-180" max="180" value="0" class="accent-orange-500 bg-neutral-950 h-1.5 rounded-lg appearance-none">
                        </div>
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs text-neutral-400 font-semibold uppercase">Preset Motions</label>
                        <div class="grid grid-cols-3 gap-2">
                            <button id="cam-cinematic" class="bg-neutral-950 border border-neutral-800 rounded-lg p-2 text-xs text-neutral-300 hover:border-orange-500 active:scale-95 transition">Cinematic Zoom</button>
                            <button id="cam-orbit" class="bg-neutral-950 border border-neutral-800 rounded-lg p-2 text-xs text-neutral-300 hover:border-orange-500 active:scale-95 transition">Orbit Spin</button>
                            <button id="cam-glitch" class="bg-neutral-950 border border-neutral-800 rounded-lg p-2 text-xs text-neutral-300 hover:border-orange-500 active:scale-95 transition">Handheld Shake</button>
                        </div>
                    </div>
                </div>

                <div id="panel-presets" class="hidden space-y-3">
                    <label class="text-xs text-neutral-400 font-semibold uppercase block mb-1">Color Palette & Environment Presets</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button id="preset-orange" class="bg-gradient-to-r from-orange-600 to-amber-500 rounded-xl p-3 text-left font-bold text-xs flex justify-between items-center shadow-lg transform active:scale-95 transition">
                            Cinematic Copper <div class="w-4 h-4 rounded-full bg-white/20 border border-white/40"></div>
                        </button>
                        <button id="preset-cyber" class="bg-gradient-to-r from-purple-600 to-pink-500 rounded-xl p-3 text-left font-bold text-xs flex justify-between items-center shadow-lg transform active:scale-95 transition">
                            Cyber Neon <div class="w-4 h-4 rounded-full bg-white/20 border border-white/40"></div>
                        </button>
                        <button id="preset-monochrome" class="bg-gradient-to-r from-zinc-700 to-neutral-900 rounded-xl p-3 text-left font-bold text-xs flex justify-between items-center shadow-lg transform active:scale-95 transition">
                            Sleek Carbon <div class="w-4 h-4 rounded-full bg-white/20 border border-white/40"></div>
                        </button>
                        <button id="preset-battery" class="bg-gradient-to-r from-green-600 to-emerald-400 rounded-xl p-3 text-left font-bold text-xs flex justify-between items-center shadow-lg transform active:scale-95 transition">
                            iOS Battery Glow <div class="w-4 h-4 rounded-full bg-white/20 border border-white/40"></div>
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="app.js"></script>
</body>
</html>
